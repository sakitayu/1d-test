name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
        env:
          # 本リポジトリは GITHUB_TOKEN 無しでも動作し、テストは全て GitHub API を
          # モックしているため CI 上は機能的には不要。Actions が無コストで自動発行する
          # secrets.GITHUB_TOKEN を念のため渡すことで、万一テストでモック漏れがあった
          # 際に authed クォータ (Actions の token は 1,000 req/hour/repo 程度) で
          # 動作する保険として機能させる。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm build
        env:
          # build 自体は API を呼ばないので機能的に不要だが、上記同様の保険として渡す。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
